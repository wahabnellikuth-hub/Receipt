<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#16a34a">
    <title>Madrassa Fee Management</title>
    
    <!-- PWA Manifest -->
    <link rel="manifest" href="manifest.json">
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- CSS -->
    <link rel="stylesheet" href="css/app.css">
    
    <!-- CDNs -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
</head>
<body>
    <div id="app">
        <!-- Theme Toggle -->
        <button id="theme-toggle" onclick="App.toggleTheme()" style="position: fixed; top: 16px; right: 16px; z-index: 1000; background: var(--surface-color); border: 1px solid var(--border-color); color: var(--text-main); border-radius: 50%; cursor: pointer; box-shadow: var(--shadow-md); display: flex; align-items: center; justify-content: center; width: 40px; height: 40px; transition: all 0.3s;">
            <i data-lucide="moon" id="theme-icon" style="width: 20px; height: 20px;"></i>
        </button>

        <!-- Main Content Area -->
        <main id="main-content">
            <!-- Screens will be injected here -->
        </main>
        
        <!-- Bottom Navigation -->
        <nav id="bottom-nav" class="bottom-nav">
            <button class="nav-item active" data-target="dashboard">
                <i data-lucide="layout-dashboard"></i>
                <span>Home</span>
            </button>
            <button class="nav-item" data-target="classes">
                <i data-lucide="users"></i>
                <span>Classes</span>
            </button>
            <button class="nav-item" data-target="payments">
                <i data-lucide="receipt"></i>
                <span>Payments</span>
            </button>
            <button class="nav-item" data-target="reports">
                <i data-lucide="bar-chart-3"></i>
                <span>Reports</span>
            </button>
        </nav>
    </div>

    <!-- Modals Container -->
    <div id="modals-container"></div>

    <!-- Toast Notification Container -->
    <div id="toast-container"></div>

    <!-- App Scripts -->
    <script src="js/db.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/app.js"></script>
    
    <script>
        // Initialize Lucide icons
        lucide.createIcons();
        
        // Register Service Worker and force update
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js').then(reg => {
                    console.log('SW registered:', reg);
                    // Force update to ensure new sw.js is fetched
                    reg.update();
                }).catch(err => console.error('SW Error:', err));
                
                // If there's a waiting SW (new version), activate it immediately
                navigator.serviceWorker.addEventListener('controllerchange', () => {
                    window.location.reload();
                });
            });
        }
    </script>
</body>
</html>
